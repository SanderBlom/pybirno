name: Release Drafter

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  update-release-draft:
    name: Draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
